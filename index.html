<!DOCTYPE html>
<html lang="id">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Nota Laundry - Buka Aplikasi</title>
	<meta http-equiv="refresh" content="0; url=nota-laundry.html" />
	<style>
		:root {
			--bg1: #f8f2ea;
			--bg2: #e7efe9;
			--card: rgba(255, 255, 255, 0.92);
			--text: #213036;
			--muted: #5e6e74;
			--brand: #0f766e;
			--line: #d8e1db;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			display: grid;
			place-items: center;
			font-family: Verdana, Geneva, Tahoma, sans-serif;
			color: var(--text);
			background:
				radial-gradient(circle at top right, rgba(15, 118, 110, 0.18), transparent 32%),
				radial-gradient(circle at left bottom, rgba(200, 92, 46, 0.14), transparent 28%),
				linear-gradient(160deg, var(--bg1), var(--bg2));
			padding: 20px;
		}

		.card {
			width: min(560px, 100%);
			background: var(--card);
			border: 1px solid var(--line);
			border-radius: 20px;
			padding: 24px;
			box-shadow: 0 16px 36px rgba(0, 0, 0, 0.1);
		}

		h1 {
			margin: 0 0 10px;
			font-size: clamp(1.6rem, 3vw, 2rem);
			letter-spacing: -0.03em;
		}

		p {
			margin: 0;
			color: var(--muted);
			line-height: 1.7;
		}

		a {
			display: inline-block;
			margin-top: 16px;
			text-decoration: none;
			background: var(--brand);
			color: #fff;
			padding: 11px 14px;
			border-radius: 12px;
			font-weight: 700;
		}
	</style>
</head>
<body>
	<main class="card">
		<h1>Mengalihkan ke Nota Laundry...</h1>
		<p>
			Halaman utama aplikasi ada di <strong>nota-laundry.html</strong>. Jika tidak berpindah otomatis,
			klik tombol di bawah.
		</p>
		<a href="nota-laundry.html">Buka Nota Laundry</a>
	</main>
</body>
</html>
